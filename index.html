<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Responsive landing page for a monitoring dashboard platform built with HTML and CSS."
    />
    <link rel="icon" href="assets/img/favicon-tecboard-roxo.svg" type="image/svg+xml">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Unbounded:wght@200..900&display=swap" rel="stylesheet"
    >

    <title>Tecboard - Monitoring Dashboard Landing Page</title>
</head>
<body>
    <header class="header">
        <img 
            src="assets/img/logo-tecboard-branco.png" 
            alt="Logo Tecboard na cor branca"
            class="logo"
        >
    </header>

    <main class="main-content">
        <section class="hero">
            <h1>
                <span>Stay focused</span>
                <br>on what matters
            </h1>

            <p>
                Real-time monitoring with smart alerts to keep your application running and prevent unexpected downtime.
            </p>

            <a href="#" class="cta-button">Try the demo</a>

            <img 
                src="assets/img/celulares-sobrepostos-desktop.png" 
                alt="Tecboard dashboard preview displayed on two mobile screens"
                class="hero-image"
            >
        </section>
    </main>
</body>
</html>
